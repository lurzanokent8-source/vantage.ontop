<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nebula | Unified Panel</title>
    <style>
        :root {
            --accent: #a855f7;
            --glass: rgba(255, 255, 255, 0.03);
            --rainbow: linear-gradient(90deg, #00fff2, #ff00c8, #00fff2);
        }

        body {
            margin: 0;
            background: #020617;
            color: white;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        /* Views */
        #login-view, #dashboard-view { display: none; height: 100vh; }
        .active-view { display: flex !important; }

        /* Login Section */
        #login-view { justify-content: center; align-items: center; background: radial-gradient(circle at top right, #1e1b4b, #020617); }
        .login-card {
            width: 350px;
            padding: 40px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }

        /* Dashboard Section */
        .sidebar {
            width: 260px;
            background: var(--glass);
            backdrop-filter: blur(30px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .main-content { flex: 1; padding: 40px; overflow-y: auto; }
        .tab-content { display: none; animation: fadeIn 0.3s ease; }
        .tab-content.active { display: block; }

        /* Reusable UI */
        .glass-card {
            background: var(--glass);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 25px;
            border-radius: 20px;
            margin-bottom: 20px;
        }

        .nav-item {
            padding: 12px 15px;
            margin: 5px 0;
            border-radius: 12px;
            cursor: pointer;
            color: #94a3b8;
            transition: 0.2s;
        }

        .nav-item:hover, .nav-item.active { background: rgba(168, 85, 247, 0.2); color: white; }
        .master-nav { display: none; border: 1px solid #ff00c8; color: #ff00c8; }

        input, textarea {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #00fff2;
            padding: 12px;
            border-radius: 10px;
            box-sizing: border-box;
            outline: none;
            font-family: monospace;
        }

        .btn {
            background: var(--accent);
            border: none;
            padding: 12px 20px;
            border-radius: 10px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn:hover { filter: brightness(1.2); transform: translateY(-2px); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="login-view">
        <div class="login-card">
            <h1 style="background: var(--rainbow); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">NEBULA</h1>
            <input type="email" id="emailInput" placeholder="name@gmail.com">
            <button class="btn" style="width: 100%;" onclick="login()">Enter Panel</button>
        </div>
    </div>

    <div id="dashboard-view">
        <div class="sidebar">
            <h2 style="background: var(--rainbow); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">NEBULA</h2>
            <div class="nav-item active" onclick="switchTab('exec', this)">Executor</div>
            <div class="nav-item" onclick="switchTab('white', this)">Whitelist</div>
            <div class="nav-item" onclick="switchTab('games', this)">Games</div>
            <div class="nav-item master-nav" id="masterTabBtn" onclick="switchTab('master', this)">MASTER PANEL</div>
            <div class="nav-item" style="margin-top: auto; color: #ef4444;" onclick="logout()">Logout</div>
        </div>

        <div class="main-content">
            <div id="exec" class="tab-content active">
                <h1>Executor</h1>
                <div class="glass-card">
                    <textarea style="height: 300px;" placeholder="-- Enter code or require() here..."></textarea>
                    <div style="display: flex; gap: 10px;">
                        <button class="btn" style="background: #3b82f6;">R6 Respawn</button>
                        <button class="btn" style="background: #ec4899;">R15 Respawn</button>
                        <button class="btn">Execute</button>
                    </div>
                </div>
            </div>

            <div id="master" class="tab-content">
                <h1 style="color: #ff00c8;">Master Control</h1>
                <div class="glass-card">
                    <h3>Generate Keys</h3>
                    <select class="btn" style="background: rgba(255,255,255,0.1);">
                        <option>Standard (50 R$)</option>
                        <option>Premium (150 R$)</option>
                    </select>
                    <button class="btn">Generate Key</button>
                </div>
                <div class="glass-card">
                    <h3>Blacklist</h3>
                    <input type="text" placeholder="Username...">
                    <button class="btn" style="background: #ef4444;">Perm Ban</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const MASTER_EMAIL = "lurzanokent8@gmail.com";

        function checkAuth() {
            const user = localStorage.getItem("nebula_session");
            if (user) {
                document.getElementById('login-view').classList.remove('active-view');
                document.getElementById('dashboard-view').classList.add('active-view');
                if (user === MASTER_EMAIL) {
                    document.getElementById('masterTabBtn').style.display = 'block';
                }
            } else {
                document.getElementById('login-view').classList.add('active-view');
                document.getElementById('dashboard-view').classList.remove('active-view');
            }
        }

        function login() {
            const email = document.getElementById('emailInput').value;
            if (email.includes("@gmail.com")) {
                localStorage.setItem("nebula_session", email);
                checkAuth();
            }
        }

        function logout() {
            localStorage.clear();
            checkAuth();
        }

        function switchTab(tabId, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            el.classList.add('active');
        }

        // Initialize
        checkAuth();
    </script>
</body>
</html>
